{% extends "base.html" %}

{% block title %}Add Tag{% endblock %}

{% block content %}

<h1>Create a tag</h1>

<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control">
    </div>

    <a href="/tags" class="btn btn-secondary">Cancel</a>
    <button class="btn btn-success">Add</button>
</form>

{% endblock %}
